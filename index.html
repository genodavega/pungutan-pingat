<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<style>

body{
font-family:Arial;
background:#f5f7fa;
margin:20px;
}

.header{
background:#0d5b4c;
padding:25px;
border-radius:15px;
color:white;
}

.cards{
display:flex;
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 0 5px #ddd;
flex:1;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th{
background:#0d5b4c;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #eee;
}

.gold{
color:#e4b200;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">

<h1>Carta Kedudukan Pingat Kejohanan</h1>

</div>

<div class="cards">

<div class="card">
Pendahulu
<h2 id="leader">-</h2>
</div>

<div class="card">
Jumlah Emas
<h2 id="totalEmas">0</h2>
</div>

<div class="card">
Jumlah Perak
<h2 id="totalPerak">0</h2>
</div>

<div class="card">
Jumlah Gangsa
<h2 id="totalGangsa">0</h2>
</div>

</div>

<table>

<thead>

<tr>

<th>Rank</th>
<th>Pasukan</th>
<th>🥇</th>
<th>🥈</th>
<th>🥉</th>
<th>Mata</th>

</tr>

</thead>

<tbody id="ranking">

</tbody>

</table>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyLqA8fE6_hz8X-XfrE6RHc7uQiviEhtYVPVND2_QyGdM0kU8b15XYigozcFDdhYM2r6A/exec";

async function loadData(){

const res =
await fetch(API_URL);

const data =
await res.json();

let html="";

let totalEmas=0;
let totalPerak=0;
let totalGangsa=0;

data.forEach((team,index)=>{

totalEmas+=team.emas;
totalPerak+=team.perak;
totalGangsa+=team.gangsa;

html+=`

<tr>

<td>${index+1}</td>
<td>${team.pasukan}</td>
<td>${team.emas}</td>
<td>${team.perak}</td>
<td>${team.gangsa}</td>
<td>${team.mata}</td>

</tr>

`;

});

document.getElementById("ranking").innerHTML=html;

document.getElementById("leader").innerText=
data[0].pasukan;

document.getElementById("totalEmas").innerText=
totalEmas;

document.getElementById("totalPerak").innerText=
totalPerak;

document.getElementById("totalGangsa").innerText=
totalGangsa;

}

loadData();

setInterval(loadData,5000);

</script>

</body>

</html>
