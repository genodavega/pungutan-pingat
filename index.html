<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Carta Pingat</title>

<style>

body{
font-family:Arial;
background:#f5f7fa;
padding:20px;
}

.header{

background:#0f5d4d;

padding:25px;

border-radius:15px;

color:white;

}

table{

width:100%;

background:white;

margin-top:20px;

border-collapse:collapse;

}

th{

background:#0f5d4d;

color:white;

padding:12px;

}

td{

padding:12px;

text-align:center;

border-bottom:1px solid #ddd;

}

.rank1{
background:#fff9d6;
}

.rank2{
background:#f0f0f0;
}

.rank3{
background:#ffe4cc;
}

</style>

</head>

<body>

<div class="header">

<h1>
Carta Kedudukan Pingat MAKSUR 2026
</h1>

</div>

<table>

<thead>

<tr>

<th>Kedudukan</th>
<th>Pasukan</th>
<th>🥇</th>
<th>🥈</th>
<th>🥉</th>

</tr>

</thead>

<tbody id="ranking">

</tbody>

</table>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyLqA8fE6_hz8X-XfrE6RHc7uQiviEhtYVPVND2_QyGdM0kU8b15XYigozcFDdhYM2r6A/exec";

async function loadRanking(){

const res =
await fetch(API_URL);

const data =
await res.json();

let html="";

data.forEach((team,index)=>{

let cls="";

if(index==0)
cls="rank1";

if(index==1)
cls="rank2";

if(index==2)
cls="rank3";

html += `

<tr class="${cls}">

<td>${index+1}</td>

<td>${team.pasukan}</td>

<td>${team.emas}</td>

<td>${team.perak}</td>

<td>${team.gangsa}</td>

</tr>

`;

});

document
.getElementById("ranking")
.innerHTML=html;

}

loadRanking();

setInterval(
loadRanking,
5000
);

</script>

</body>
</html>
