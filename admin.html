<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>Admin Pingat</title>

<style>

body{
font-family:Arial;
background:#f3f5f7;
padding:30px;
}

.card{

max-width:700px;
margin:auto;

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 0 15px rgba(0,0,0,.1);

}

h2{
margin-top:0;
}

select{

width:100%;

padding:12px;

margin-bottom:15px;

}

button{

width:100%;

padding:15px;

background:#0f5d4d;

color:white;

border:none;

font-size:16px;

border-radius:8px;

cursor:pointer;

}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="card">

<h2>Pemberian Pingat</h2>

<label>Sukan</label>
<select id="sukan"></select>

<label>Pemenang Emas</label>
<select id="emas"></select>

<label>Pemenang Perak</label>
<select id="perak"></select>

<label>Pemenang Gangsa</label>
<select id="gangsa"></select>

<button onclick="simpanKeputusan()">
ANUGERAH PINGAT
</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyLqA8fE6_hz8X-XfrE6RHc7uQiviEhtYVPVND2_QyGdM0kU8b15XYigozcFDdhYM2r6A/exec";

async function loadSetup(){

const res =
await fetch(API_URL+"?mode=setup");

const data =
await res.json();

isiDropdown(
"sukan",
data.sukan
);

isiDropdown(
"emas",
data.pasukan
);

isiDropdown(
"perak",
data.pasukan
);

isiDropdown(
"gangsa",
data.pasukan
);

}

function isiDropdown(id,list){

let html="";

list.forEach(item=>{

html +=
`<option>${item}</option>`;

});

document
.getElementById(id)
.innerHTML=html;

}

async function simpanKeputusan(){

const payload = {

sukan:
document.getElementById("sukan").value,

emas:
document.getElementById("emas").value,

perak:
document.getElementById("perak").value,

gangsa:
document.getElementById("gangsa").value

};

await fetch(API_URL,{

method:"POST",

body:JSON.stringify(payload)

});

alert(
"Keputusan berjaya disimpan"
);

}

loadSetup();

</script>

</body>
</html>
